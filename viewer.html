<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Participant Data Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 180px;
      background: #1e293b;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 18px 16px 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #475569;
      border-bottom: 1px solid #334155;
    }
    .participant-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .p-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      border-left: 3px solid transparent;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .p-item:hover { background: #263348; color: #e2e8f0; }
    .p-item.active { background: #1e3a5f; color: #60a5fa; }

    /* ── Saved folder (sidebar bottom) ── */
    .sidebar-divider {
      height: 1px;
      background: #334155;
      margin: 4px 12px;
      flex-shrink: 0;
    }
    .saved-folder {
      padding: 11px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      border-left: 3px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: background 0.12s, color 0.12s;
      user-select: none;
      flex-shrink: 0;
    }
    .saved-folder:hover { background: #263348; color: #e2e8f0; }
    .saved-folder.active { background: #1e3a5f; color: #fbbf24; border-left-color: #f59e0b; }
    .saved-count-pill {
      font-size: 10px;
      font-weight: 700;
      background: #334155;
      color: #64748b;
      padding: 1px 7px;
      border-radius: 20px;
      min-width: 20px;
      text-align: center;
      transition: background 0.12s, color 0.12s;
    }
    .saved-folder.active .saved-count-pill { background: #92400e; color: #fde68a; }

    /* ── Save icon button on interaction items ── */
    .i-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .save-star {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: transparent;
      padding: 0 2px;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.1s;
    }
    .i-item:hover .save-star { color: #cbd5e1; }
    .save-star.saved { color: #f59e0b !important; }
    .save-star:hover { color: #f59e0b !important; }

    /* ── Saved view in middle panel ── */
    .saved-view-header {
      padding: 10px 14px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      flex-shrink: 0;
    }
    .saved-item-label {
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .unsave-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #cbd5e1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .unsave-btn:hover { color: #f43f5e; }

    /* ── Middle panel ── */
    .middle {
      width: 280px;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .tabs {
      display: flex;
      border-bottom: 2px solid #e2e8f0;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 13px 0;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.12s;
    }
    .tab-btn:hover { color: #3b82f6; }
    .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }

    /* ── Analyze bar ── */
    .analyze-bar {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
      align-items: center;
    }
    .analyze-btn {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .analyze-btn:hover:not(:disabled) { background: #eff6ff; color: #3b82f6; border-color: #bfdbfe; }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .analyze-btn.running { color: #f59e0b; border-color: #fde68a; background: #fffbeb; }
    .flag-filter-btn {
      padding: 6px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .flag-filter-btn:hover { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .flag-filter-btn.active { background: #fff1f2; color: #be123c; border-color: #fecdd3; }
    .flag-filter-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .middle-count {
      padding: 8px 14px 4px;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      flex-shrink: 0;
    }
    .interaction-list { flex: 1; overflow-y: auto; }
    .i-item {
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.1s;
      user-select: none;
    }
    .i-item:hover { background: #f8fafc; }
    .i-item.active { background: #eff6ff; }
    .i-item.syco-flagged { border-left: 3px solid #f43f5e; }
    .i-title { font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 5px; }
    .i-turns { font-size: 11px; font-weight: 400; color: #94a3b8; }
    .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
    .b-blue   { background: #dbeafe; color: #1d4ed8; }
    .b-green  { background: #dcfce7; color: #15803d; }
    .b-red    { background: #fee2e2; color: #b91c1c; }
    .b-orange { background: #ffedd5; color: #c2410c; }
    .b-gray   { background: #f1f5f9; color: #475569; }
    .b-syco   { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }

    /* ── Sycophancy banner in chat ── */
    .syco-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 20px;
      background: #fff1f2;
      border-bottom: 1px solid #fecdd3;
      flex-shrink: 0;
    }
    .syco-banner-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .syco-banner-text { font-size: 12px; line-height: 1.5; }
    .syco-banner-label { font-weight: 700; color: #be123c; }
    .syco-banner-reason { color: #9f1239; margin-top: 2px; }

    /* ── Chat panel ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      gap: 10px;
    }
    .empty-state .icon { font-size: 52px; }
    .empty-state p { font-size: 14px; }

    #chatView { display: none; flex-direction: column; height: 100%; overflow: hidden; }

    .chat-header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header-text { flex: 1; min-width: 0; }
    .chat-header h2 { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-sub { font-size: 12px; color: #94a3b8; }

    .ann-panel {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      flex-shrink: 0;
    }
    .ann-label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-right: 2px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f0f2f5;
    }

    .msg-group { display: flex; flex-direction: column; }
    .msg-group.user { align-items: flex-end; }
    .msg-group.ai   { align-items: flex-start; }

    .msg-sender { font-size: 10px; font-weight: 600; color: #94a3b8; margin-bottom: 3px; padding: 0 4px; display: flex; align-items: center; gap: 5px; }

    .bubble {
      max-width: 68%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .bubble.user {
      background: #3b82f6;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.ai {
      background: #fff;
      color: #1e293b;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    /* New AI response styles per provider */
    .bubble.new-openai    { background: #f0fdf4; border-color: #86efac; }
    .bubble.new-anthropic { background: #faf5ff; border-color: #d8b4fe; }
    .bubble.new-gemini    { background: #eff6ff; border-color: #93c5fd; }
    .bubble.err           { background: #fee2e2; border-color: #fca5a5; color: #b91c1c; }

    .provider-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
    .tag-openai    { background: #dcfce7; color: #15803d; }
    .tag-anthropic { background: #ede9fe; color: #7c3aed; }
    .tag-gemini    { background: #dbeafe; color: #1d4ed8; }

    .msg-image {
      max-width: 260px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      background: #e5e7eb;
    }
    .msg-image img { width: 100%; display: block; cursor: zoom-in; }
    .img-caption { font-size: 10px; color: #94a3b8; padding: 4px 8px 5px; background: #fff; }

    /* Divider between original and continued conversation */
    .continue-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
    }
    .continue-divider::before, .continue-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #cbd5e1;
      animation: tdot 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Chat input bar ── */
    .chat-input-bar {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .provider-select {
      padding: 7px 8px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      background: #f8fafc;
      cursor: pointer;
      flex-shrink: 0;
      height: 36px;
    }
    .provider-select:focus { outline: none; border-color: #3b82f6; }
    .chat-input {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.45;
      background: #f8fafc;
      transition: border-color 0.12s;
    }
    .chat-input:focus { border-color: #3b82f6; background: #fff; }
    .chat-input::placeholder { color: #94a3b8; }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      border: none;
      font-size: 17px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, transform 0.1s;
    }
    .send-btn:hover:not(:disabled) { background: #2563eb; transform: scale(1.05); }
    .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

    /* ── Settings modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 900;
    }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 0;
      width: 440px;
      max-width: 95vw;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f1f5f9;
    }
    .modal-title { font-size: 15px; font-weight: 700; color: #1e293b; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8; line-height: 1; padding: 2px; }
    .modal-close:hover { color: #475569; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 18px; }
    .key-field { display: flex; flex-direction: column; gap: 7px; }
    .key-label {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .key-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: background 0.2s; }
    .key-dot.set   { background: #22c55e; }
    .key-dot.unset { background: #e2e8f0; }
    .key-row { display: flex; gap: 6px; }
    .key-input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Menlo', 'Courier New', monospace;
      outline: none;
      transition: border-color 0.12s;
      color: #1e293b;
    }
    .key-input:focus { border-color: #3b82f6; }
    .eye-btn {
      padding: 9px 11px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #f8fafc;
      cursor: pointer;
      font-size: 14px;
      color: #64748b;
      flex-shrink: 0;
      line-height: 1;
    }
    .eye-btn:hover { background: #f1f5f9; }
    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px 20px;
      border-top: 1px solid #f1f5f9;
    }
    .modal-note { font-size: 11px; color: #94a3b8; line-height: 1.4; }
    .save-btn {
      padding: 9px 22px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .save-btn:hover { background: #2563eb; }

    /* ── Gear button in chat header ── */
    .gear-btn {
      padding: 6px 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      color: #64748b;
      flex-shrink: 0;
      line-height: 1;
      transition: background 0.1s;
    }
    .gear-btn:hover { background: #f1f5f9; color: #1e293b; }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      cursor: zoom-out;
    }
    .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
    .lb-close { position: absolute; top: 18px; right: 22px; font-size: 26px; color: #fff; cursor: pointer; background: none; border: none; opacity: 0.8; }
    .lb-close:hover { opacity: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">Participants</div>
  <div class="participant-list" id="participantList"></div>
  <div class="sidebar-divider"></div>
  <div class="saved-folder" id="savedFolder" onclick="showSavedView()">
    <span>📁 Saved</span>
    <span class="saved-count-pill" id="savedCountPill">0</span>
  </div>
</div>

<!-- Middle -->
<div class="middle">
  <div class="tabs">
    <button class="tab-btn active" id="diaryTab" onclick="switchTab('diary')">Diary</button>
    <button class="tab-btn" id="inlabTab" onclick="switchTab('inlab')">In-Lab</button>
  </div>
  <div class="analyze-bar">
    <button class="analyze-btn" id="analyzeBtn" onclick="analyzeSycophancy()" disabled>Analyze</button>
    <button class="flag-filter-btn" id="flagFilterBtn" onclick="toggleFlaggedFilter()" disabled>Flagged only</button>
  </div>
  <div class="middle-count" id="middleCount">Select a participant</div>
  <div class="interaction-list" id="interactionList"></div>
</div>

<!-- Chat panel -->
<div class="chat-panel">
  <div class="empty-state" id="emptyState">
    <div class="icon"></div>
    <p>Select a participant and interaction to view the conversation</p>
  </div>

  <div id="chatView">
    <div class="chat-header">
      <div class="chat-header-text">
        <h2 id="chatTitle"></h2>
        <div class="chat-sub" id="chatSub"></div>
      </div>
      <button class="gear-btn" onclick="openSettings()" title="API Keys">⚙</button>
    </div>
    <div class="ann-panel" id="annPanel"></div>
    <div class="syco-banner" id="sycoBanner" style="display:none;">
      <div class="syco-banner-icon"></div>
      <div class="syco-banner-text">
        <div class="syco-banner-label">Sycophancy flagged</div>
        <div class="syco-banner-reason" id="sycoBannerReason"></div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-bar">
      <select class="provider-select" id="providerSelect">
        <option value="openai">GPT-4o</option>
        <option value="anthropic" selected>Claude</option>
        <option value="gemini">Gemini</option>
      </select>
      <textarea class="chat-input" id="chatInput"
        placeholder="Continue the conversation… (Enter to send, Shift+Enter for newline)"
        rows="1"
        onkeydown="handleInputKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&#10148;</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">API Keys</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="key-field">
        <div class="key-label">
          <span class="key-dot unset" id="dot-openai"></span>
          OpenAI &mdash; GPT-4o
        </div>
        <div class="key-row">
          <input class="key-input" id="key-openai" type="password" placeholder="sk-…" autocomplete="off">
          <button class="eye-btn" onclick="toggleKey('openai')">👁</button>
        </div>
      </div>
      <div class="key-field">
        <div class="key-label">
          <span class="key-dot unset" id="dot-anthropic"></span>
          Anthropic &mdash; Claude Sonnet 4
        </div>
        <div class="key-row">
          <input class="key-input" id="key-anthropic" type="password" placeholder="sk-ant-…" autocomplete="off">
          <button class="eye-btn" onclick="toggleKey('anthropic')">👁</button>
        </div>
      </div>
      <div class="key-field">
        <div class="key-label">
          <span class="key-dot unset" id="dot-gemini"></span>
          Google &mdash; Gemini 1.5 Flash
        </div>
        <div class="key-row">
          <input class="key-input" id="key-gemini" type="password" placeholder="AIza…" autocomplete="off">
          <button class="eye-btn" onclick="toggleKey('gemini')">👁</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <span class="modal-note">Keys are stored in server memory<br>and cleared when the server restarts.</span>
      <button class="save-btn" onclick="saveKeys()">Save Keys</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lbImg" src="" alt="">
</div>

<script>
const state = {
  participant: null,
  dataType: 'diary',
  interaction: null,
  currentTurns: [],
  extraMessages: [],
  sycophancyResults: {},
  showFlaggedOnly: false,
  analyzing: false,
  keyStatus: {},
  sending: false,
  dividerAdded: false,
  savedInteractions: JSON.parse(localStorage.getItem('savedInteractions') || '[]'),
  viewMode: 'participant',  // 'participant' | 'saved'
};

const PROVIDER_NAMES   = { openai: 'GPT-4o', anthropic: 'Claude', gemini: 'Gemini' };
const PROVIDER_TAG_CLS = { openai: 'tag-openai', anthropic: 'tag-anthropic', gemini: 'tag-gemini' };
const PROVIDER_BUB_CLS = { openai: 'new-openai', anthropic: 'new-anthropic', gemini: 'new-gemini' };
const SYSTEM_PROMPT    = 'You are Be My AI, an AI assistant for visually impaired users. You help them understand their visual environment by describing images and answering questions. Continue the following conversation naturally and helpfully.';

async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── Init ──────────────────────────────────────────────────────────────────

async function init() {
  const ps = await api('/api/participants');
  document.getElementById('participantList').innerHTML = ps
    .map(p => `<div class="p-item" onclick="selectParticipant('${p}')">${p}</div>`)
    .join('');
  await loadKeyStatus();
  persistSaved(); // sync the pill count from localStorage
}

// ── Participants & tabs ───────────────────────────────────────────────────

async function selectParticipant(p) {
  if (state.viewMode === 'saved') exitSavedView();
  state.participant = p;
  state.interaction = null;
  state.sycophancyResults = {};
  state.showFlaggedOnly = false;
  document.querySelectorAll('.p-item').forEach(el =>
    el.classList.toggle('active', el.textContent === p)
  );
  await loadInteractions();
  resetAnalyzeUI();
  showEmpty();
}

function switchTab(type) {
  state.dataType = type;
  state.interaction = null;
  state.sycophancyResults = {};
  state.showFlaggedOnly = false;
  document.getElementById('diaryTab').classList.toggle('active', type === 'diary');
  document.getElementById('inlabTab').classList.toggle('active', type === 'inlab');
  resetAnalyzeUI();
  if (state.participant) { loadInteractions(); showEmpty(); }
}

function resetAnalyzeUI() {
  const ab = document.getElementById('analyzeBtn');
  const fb = document.getElementById('flagFilterBtn');
  ab.textContent = '🔍 Analyze';
  ab.className = 'analyze-btn';
  ab.onclick = analyzeSycophancy;
  ab.disabled = !state.participant;
  fb.disabled = true;
  fb.classList.remove('active');
  fb.textContent = '🚩 Flagged only';
}

// items is the raw list from the API; re-render respects current sycophancy results + filter
let _cachedItems = [];

async function loadInteractions() {
  _cachedItems = await api(`/api/${state.participant}/${state.dataType}`);
  // Check if we have cached sycophancy results for this view
  try {
    const cached = await api(`/api/sycophancy/${state.participant}/${state.dataType}`);
    if (Object.keys(cached).length > 0) {
      state.sycophancyResults = cached;
      document.getElementById('flagFilterBtn').disabled = false;
    }
  } catch(e) {}
  renderInteractionList();
}

function renderInteractionList() {
  const items = _cachedItems;
  const hasSyco = Object.keys(state.sycophancyResults).length > 0;
  const flaggedCount = hasSyco
    ? items.filter(it => state.sycophancyResults[it.id]?.is_sycophantic).length
    : 0;

  const visible = state.showFlaggedOnly
    ? items.filter(it => state.sycophancyResults[it.id]?.is_sycophantic)
    : items;

  const countEl = document.getElementById('middleCount');
  if (state.showFlaggedOnly && hasSyco) {
    countEl.textContent = `${state.participant} · ${flaggedCount} flagged / ${items.length} total`;
  } else if (hasSyco) {
    countEl.textContent = `${state.participant} · ${items.length} interactions · ${flaggedCount} flagged`;
  } else {
    countEl.textContent = `${state.participant} · ${items.length} interaction${items.length !== 1 ? 's' : ''}`;
  }

  document.getElementById('interactionList').innerHTML = visible.map((item) => {
    const i = items.indexOf(item);
    const syco = state.sycophancyResults[item.id];
    const isFlagged = syco?.is_sycophantic;
    const badges = makeBadges(item.annotations, isFlagged, syco?.confidence);
    const saveKey = `${state.participant}/${state.dataType}/${item.id}`;
    const isSaved = state.savedInteractions.some(s => s.key === saveKey);
    return `<div class="i-item${isFlagged ? ' syco-flagged' : ''}" id="ii-${item.id}" onclick="selectInteraction('${item.id}', ${i})">
      <div class="i-title-row">
        <span class="i-title">Interaction ${i + 1} <span class="i-turns">(${item.turn_count} turns)</span></span>
        <button class="save-star${isSaved ? ' saved' : ''}" id="star-${item.id}"
          onclick="toggleSave('${state.participant}','${state.dataType}','${item.id}',${i + 1},event)"
          title="${isSaved ? 'Remove from Saved' : 'Save to folder'}">★</button>
      </div>
      ${badges ? `<div class="badges">${badges}</div>` : ''}
    </div>`;
  }).join('');
}

function makeBadges(ann, isFlagged, confidence) {
  const b = [];
  if (isFlagged) {
    const conf = confidence ? ` · ${confidence}` : '';
    b.push(`<span class="badge b-syco">Sycophantic${conf}</span>`);
  }
  if (!ann) return b.join('');
  if (ann.question_category)
    ann.question_category.split(',').forEach(q =>
      b.push(`<span class="badge b-blue">${q.trim()}</span>`)
    );
  if (ann.task_completed)
    b.push(ann.task_completed === 'Yes'
      ? `<span class="badge b-green">Completed</span>`
      : `<span class="badge b-red">Not completed</span>`);
  if (ann.in_a_hurry === 'yes') b.push(`<span class="badge b-orange">In a hurry</span>`);
  if (ann.environment_setting && ann.environment_setting !== 'NA')
    b.push(`<span class="badge b-gray">${ann.environment_setting}</span>`);
  return b.join('');
}

// ── Interaction view ──────────────────────────────────────────────────────

async function selectInteraction(id, idx) {
  state.interaction = id;
  state.extraMessages = [];
  state.dividerAdded = false;
  document.querySelectorAll('.i-item').forEach(el => el.classList.remove('active'));
  document.getElementById('ii-' + id)?.classList.add('active');
  const data = await api(`/api/${state.participant}/${state.dataType}/${id}`);
  state.currentTurns = data.turns || [];
  renderChat(data, idx + 1);
}

function renderChat(data, num) {
  document.getElementById('emptyState').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';

  // Sycophancy banner
  const syco = state.sycophancyResults[state.interaction];
  const sycoBanner = document.getElementById('sycoBanner');
  if (syco?.is_sycophantic) {
    document.getElementById('sycoBannerReason').textContent = syco.reason || '';
    sycoBanner.style.display = 'flex';
  } else {
    sycoBanner.style.display = 'none';
  }

  document.getElementById('chatTitle').textContent =
    `${state.participant} · ${state.dataType === 'diary' ? 'Diary' : 'In-Lab'} · Interaction ${num}`;
  document.getElementById('chatSub').textContent =
    `${(data.turns || []).length} original turns`;

  // Annotations
  const annPanel = document.getElementById('annPanel');
  if (data.annotations) {
    const ann = data.annotations;
    const tech = Array.isArray(ann.customization_technique_used)
      ? ann.customization_technique_used.join(', ')
      : (ann.customization_technique_used || '');
    const fields = [
      ['Category', ann.question_category],
      ['Technique', tech],
      ['Completed', ann.task_completed],
      ['Setting', ann.environment_setting],
      ['Location', ann.indoor_outdoor],
      ['Surroundings', ann.surrounding_environment],
      ['In a hurry', ann.in_a_hurry],
      ['Fam. env.', ann.familiarity_of_environment],
      ['Fam. item', ann.familiarity_of_item],
    ];
    let html = '<span class="ann-label">Annotations</span>';
    fields.forEach(([k, v]) => {
      if (v && v !== 'NA') {
        const cls = k === 'Completed' ? (v === 'Yes' ? 'b-green' : 'b-red')
                  : k === 'In a hurry' && v === 'yes' ? 'b-orange' : 'b-gray';
        html += `<span class="badge ${cls}"><strong>${k}:</strong> ${esc(v)}</span>`;
      }
    });
    annPanel.innerHTML = html;
    annPanel.style.display = 'flex';
  } else {
    annPanel.style.display = 'none';
    annPanel.innerHTML = '';
  }

  // Original turns
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML = '';
  (data.turns || []).forEach(turn => {
    const hasImg  = !!turn.local_image_path;
    const userTxt = (turn.text_usr || '').replace(/^User:\s*/i, '').trim();
    const aiTxt   = (turn.text_ai  || '').replace(/^Be My AI:\s*/i, '').trim();

    if (hasImg) {
      const src = imgUrl(turn.local_image_path);
      const div = document.createElement('div');
      div.className = 'msg-group user';
      div.innerHTML = `
        <div class="msg-sender">User · Turn ${turn.turn}</div>
        <div class="msg-image">
          <img src="${src}" alt="Turn ${turn.turn} photo" loading="lazy" onclick="openLb('${src}')">
          <div class="img-caption">Photo</div>
        </div>`;
      msgs.appendChild(div);
    }
    if (userTxt) {
      const div = document.createElement('div');
      div.className = 'msg-group user';
      div.innerHTML = `
        <div class="msg-sender">User · Turn ${turn.turn}</div>
        <div class="bubble user">${esc(userTxt)}</div>`;
      msgs.appendChild(div);
    }
    if (aiTxt) {
      const div = document.createElement('div');
      div.className = 'msg-group ai';
      div.innerHTML = `
        <div class="msg-sender">Be My AI · Turn ${turn.turn}</div>
        <div class="bubble ai">${esc(aiTxt)}</div>`;
      msgs.appendChild(div);
    }
  });

  msgs.scrollTop = 0;
}

function showEmpty() {
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('chatView').style.display = 'none';
}

// ── Chat continuation ─────────────────────────────────────────────────────

async function fetchImageAsBase64(url) {
  try {
    const res  = await fetch(url);
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const b64 = reader.result.split(',')[1];
        resolve({ data: b64, media_type: blob.type || 'image/jpeg' });
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.warn('Could not load image:', url, e);
    return null;
  }
}

async function buildMessageHistory() {
  const messages = [{ role: 'system', content: SYSTEM_PROMPT }];

  // Accumulate user content blocks across consecutive user turns
  let pendingUser = null; // null | Array of content blocks

  const flushUser = () => {
    if (!pendingUser || pendingUser.length === 0) return;
    // Simplify to plain string if there's only a single text block
    const msg = (pendingUser.length === 1 && pendingUser[0].type === 'text')
      ? { role: 'user', content: pendingUser[0].text }
      : { role: 'user', content: pendingUser };
    messages.push(msg);
    pendingUser = null;
  };

  for (const turn of state.currentTurns) {
    const hasImg  = !!turn.local_image_path;
    const userTxt = (turn.text_usr || '').replace(/^User:\s*/i, '').trim();
    const aiTxt   = (turn.text_ai  || '').replace(/^Be My AI:\s*/i, '').trim();

    if (hasImg || userTxt) {
      if (!pendingUser) pendingUser = [];
      if (hasImg) {
        const b64 = await fetchImageAsBase64(imgUrl(turn.local_image_path));
        if (b64) {
          pendingUser.push({ type: 'image', data: b64.data, media_type: b64.media_type });
        } else {
          pendingUser.push({ type: 'text', text: '[Photo — could not load]' });
        }
      }
      if (userTxt) {
        pendingUser.push({ type: 'text', text: userTxt });
      }
    }

    if (aiTxt) {
      flushUser();
      messages.push({ role: 'assistant', content: aiTxt });
    }
  }
  flushUser();

  // Extended conversation (text only — new messages after the original data)
  for (const m of state.extraMessages) {
    messages.push({ role: m.role, content: m.content });
  }

  return messages;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text || state.sending) return;
  state.sending = true;
  document.getElementById('sendBtn').disabled = true;

  const provider = document.getElementById('providerSelect').value;

  // Add divider on first continuation
  if (!state.dividerAdded) {
    const msgs = document.getElementById('chatMessages');
    const div  = document.createElement('div');
    div.className = 'continue-divider';
    div.textContent = 'Continue conversation';
    msgs.appendChild(div);
    state.dividerAdded = true;
  }

  // Optimistically append user message
  appendMsg('user', text, null);
  state.extraMessages.push({ role: 'user', content: text });
  input.value = '';
  autoResize(input);

  const typingEl = showTyping();

  // Build history — fetches all images as base64, may take a moment
  const messages = await buildMessageHistory();

  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, messages }),
    });
    const data = await res.json();
    typingEl.remove();

    if (data.error) {
      appendMsg('error', data.error, null);
    } else {
      appendMsg('assistant', data.reply, provider);
      state.extraMessages.push({ role: 'assistant', content: data.reply });
    }
  } catch (e) {
    typingEl.remove();
    appendMsg('error', 'Network error: ' + e.message, null);
  } finally {
    state.sending = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

function appendMsg(role, content, provider) {
  const msgs = document.getElementById('chatMessages');
  const div  = document.createElement('div');

  if (role === 'user') {
    div.className = 'msg-group user';
    div.innerHTML = `
      <div class="msg-sender">You</div>
      <div class="bubble user">${esc(content)}</div>`;
  } else if (role === 'assistant') {
    const tagCls = PROVIDER_TAG_CLS[provider] || 'tag-anthropic';
    const bubCls = PROVIDER_BUB_CLS[provider] || 'new-anthropic';
    const name   = PROVIDER_NAMES[provider]   || provider;
    div.className = 'msg-group ai';
    div.innerHTML = `
      <div class="msg-sender"><span class="provider-tag ${tagCls}">${name}</span></div>
      <div class="bubble ai ${bubCls}">${esc(content)}</div>`;
  } else {
    div.className = 'msg-group ai';
    div.innerHTML = `<div class="bubble ai err">⚠ ${esc(content)}</div>`;
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('chatMessages');
  const div  = document.createElement('div');
  div.className = 'msg-group ai';
  div.innerHTML = `<div class="typing-indicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Sycophancy analysis ───────────────────────────────────────────────────

function clearAnalysis() {
  state.sycophancyResults = {};
  state.showFlaggedOnly = false;
  const fb = document.getElementById('flagFilterBtn');
  fb.disabled = true;
  fb.classList.remove('active');
  fb.textContent = '🚩 Flagged only';
  const btn = document.getElementById('analyzeBtn');
  btn.textContent = '🔍 Analyze';
  btn.className = 'analyze-btn';
  btn.onclick = analyzeSycophancy;
  document.getElementById('sycoBanner').style.display = 'none';
  renderInteractionList();
}

async function analyzeSycophancy() {
  if (!state.participant || state.analyzing) return;
  state.analyzing = true;

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.className = 'analyze-btn running';
  btn.textContent = '⏳ Analyzing…';

  try {
    const res  = await fetch(`/api/analyze/${state.participant}/${state.dataType}`, { method: 'POST' });
    const data = await res.json();
    if (data.error) {
      btn.textContent = '🔍 Analyze';
      btn.className = 'analyze-btn';
      btn.disabled = false;
      alert(data.error);
    } else {
      state.sycophancyResults = data;
      const count = Object.values(data).filter(r => r.is_sycophantic).length;
      btn.textContent = `✕ Clear (${count} flagged)`;
      btn.className = 'analyze-btn';
      btn.onclick = clearAnalysis;  // next click clears instead of re-running
      btn.disabled = false;
      // Enable filter button if any flagged
      const fb = document.getElementById('flagFilterBtn');
      fb.disabled = false;
      renderInteractionList();
      // Refresh banner if a conversation is open
      if (state.interaction) {
        const syco = state.sycophancyResults[state.interaction];
        const banner = document.getElementById('sycoBanner');
        if (syco?.is_sycophantic) {
          document.getElementById('sycoBannerReason').textContent = syco.reason || '';
          banner.style.display = 'flex';
        } else {
          banner.style.display = 'none';
        }
      }
    }
  } catch (e) {
    btn.textContent = 'Analyze';
    btn.className = 'analyze-btn';
    btn.disabled = false;
    alert('Network error: ' + e.message);
  } finally {
    state.analyzing = false;
  }
}

function toggleFlaggedFilter() {
  state.showFlaggedOnly = !state.showFlaggedOnly;
  const fb = document.getElementById('flagFilterBtn');
  fb.classList.toggle('active', state.showFlaggedOnly);
  fb.textContent = state.showFlaggedOnly ? 'Show all' : 'Flagged only';
  renderInteractionList();
}

// ── Saved folder ─────────────────────────────────────────────────────────

function persistSaved() {
  localStorage.setItem('savedInteractions', JSON.stringify(state.savedInteractions));
  const pill = document.getElementById('savedCountPill');
  if (pill) pill.textContent = state.savedInteractions.length;
}

function toggleSave(participant, dataType, interactionId, num, event) {
  event.stopPropagation();
  const key = `${participant}/${dataType}/${interactionId}`;
  const idx = state.savedInteractions.findIndex(s => s.key === key);
  if (idx >= 0) {
    state.savedInteractions.splice(idx, 1);
  } else {
    state.savedInteractions.push({ key, participant, dataType, interactionId, num, savedAt: Date.now() });
  }
  persistSaved();
  // Update star button immediately without full re-render
  const btn = document.getElementById(`star-${interactionId}`);
  if (btn) {
    const nowSaved = idx < 0;
    btn.classList.toggle('saved', nowSaved);
    btn.title = nowSaved ? 'Remove from Saved' : 'Save to folder';
  }
  // Refresh saved view if open
  if (state.viewMode === 'saved') renderSavedList();
}

function showSavedView() {
  state.viewMode = 'saved';
  state.interaction = null;

  // Sidebar: deselect participant, activate saved folder
  document.querySelectorAll('.p-item').forEach(el => el.classList.remove('active'));
  document.getElementById('savedFolder').classList.add('active');

  // Hide analyze bar, show saved header
  document.querySelector('.analyze-bar').style.display = 'none';
  document.getElementById('middleCount').style.display = 'none';

  showEmpty();
  renderSavedList();
}

function renderSavedList() {
  const list = document.getElementById('interactionList');
  if (state.savedInteractions.length === 0) {
    list.innerHTML = `<div style="padding:24px 14px;font-size:13px;color:#94a3b8;text-align:center;">
      No saved interactions yet.<br>Click ★ on any conversation to save it here.
    </div>`;
    return;
  }
  list.innerHTML = state.savedInteractions
    .slice()
    .sort((a, b) => b.savedAt - a.savedAt)
    .map(s => {
      const label = `${s.participant} · ${s.dataType === 'diary' ? 'Diary' : 'In-Lab'}`;
      return `<div class="i-item" onclick="loadSavedInteraction(${JSON.stringify(s).replace(/"/g, '&quot;')})">
        <div class="i-title-row">
          <span class="i-title">Interaction ${s.num}</span>
          <button class="unsave-btn" onclick="unsaveFromFolder('${s.key}', event)" title="Remove">✕</button>
        </div>
        <div class="saved-item-label">${label}</div>
      </div>`;
    }).join('');
}

function unsaveFromFolder(key, event) {
  event.stopPropagation();
  state.savedInteractions = state.savedInteractions.filter(s => s.key !== key);
  persistSaved();
  renderSavedList();
}

async function loadSavedInteraction(saved) {
  // Switch context to the saved item's participant/dataType
  state.participant = saved.participant;
  state.dataType = saved.dataType;
  state.interaction = saved.interactionId;
  state.extraMessages = [];
  state.dividerAdded = false;
  state.sycophancyResults = {};

  document.querySelectorAll('.p-item').forEach(el =>
    el.classList.toggle('active', el.textContent === saved.participant)
  );

  const data = await api(`/api/${saved.participant}/${saved.dataType}/${saved.interactionId}`);
  state.currentTurns = data.turns || [];
  renderChat(data, saved.num);

  // Highlight item in list
  document.querySelectorAll('.i-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.i-item[onclick*="${saved.interactionId}"]`);
  if (el) el.classList.add('active');
}

function exitSavedView() {
  state.viewMode = 'participant';
  document.getElementById('savedFolder').classList.remove('active');
  document.querySelector('.analyze-bar').style.display = 'flex';
  document.getElementById('middleCount').style.display = '';
}

// ── Settings ──────────────────────────────────────────────────────────────

async function loadKeyStatus() {
  try {
    state.keyStatus = await api('/api/keys');
    updateDots();
  } catch(e) {}
}

function updateDots() {
  for (const [k, isSet] of Object.entries(state.keyStatus)) {
    const el = document.getElementById('dot-' + k);
    if (el) el.className = `key-dot ${isSet ? 'set' : 'unset'}`;
  }
}

function openSettings() {
  document.getElementById('settingsModal').style.display = 'flex';
}
function closeSettings() {
  document.getElementById('settingsModal').style.display = 'none';
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
}

async function saveKeys() {
  const body = {
    openai:    document.getElementById('key-openai').value,
    anthropic: document.getElementById('key-anthropic').value,
    gemini:    document.getElementById('key-gemini').value,
  };
  await fetch('/api/keys', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  // Clear inputs and update status
  ['openai','anthropic','gemini'].forEach(k => {
    document.getElementById('key-' + k).value = '';
    document.getElementById('key-' + k).type  = 'password';
  });
  await loadKeyStatus();
  closeSettings();
}

function toggleKey(provider) {
  const inp = document.getElementById('key-' + provider);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
}

// ── Utilities ─────────────────────────────────────────────────────────────

function imgUrl(localPath) {
  return `/images/${state.participant}/${state.dataType}/${localPath}`;
}

function esc(s) {
  return s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function openLb(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLightbox(); closeSettings(); } });

init();
</script>
</body>
</html>
